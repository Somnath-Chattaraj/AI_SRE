apiVersion: v1
kind: Canvas
metadata:
  name: deployment-failure-patcher
  description: Monitors GitHub Actions deployment failures and triggers automatic patching
spec:
  edges:
  - channel: default
    sourceId: webhook-trigger-001
    targetId: filter-failed-002
  - channel: "true"
    sourceId: filter-failed-002
    targetId: trigger-patcher-004
  - channel: success
    sourceId: trigger-patcher-004
    targetId: send-email-success-005
  - channel: failure
    sourceId: trigger-patcher-004
    targetId: send-email-failed-006
  - channel: "false"
    sourceId: filter-failed-002
    targetId: noop-success-007
  nodes:
  - id: webhook-trigger-001
    name: GitHub Deployment Webhook
    type: TYPE_TRIGGER
    trigger:
      name: webhook
    configuration:
      authentication: none
      endpoint: /webhook/github-deployment
    position:
      x: 200
      y: 300
  - id: filter-failed-002
    name: Check Deployment Failed
    type: TYPE_COMPONENT
    component:
      name: if
    configuration:
      expression: root().data.action == "completed" && root().data.workflow_run.conclusion == "failure"
    position:
      x: 500
      y: 300
  - id: trigger-patcher-004
    name: Trigger Auto-Patcher
    type: TYPE_COMPONENT
    component:
      name: http
    configuration:
      method: POST
      url: http://host.docker.internal:4000/trigger
      headers:
        - name: Content-Type
          value: application/json
      body: '{"incident_id":"INC-{{ root().data.workflow_run.id }}","failing_service":"{{ root().data.repository.name }}","workflow_name":"{{ root().data.workflow_run.name }}","commit_sha":"{{ root().data.workflow_run.head_sha }}","repository":"{{ root().data.repository.full_name }}","branch":"{{ root().data.workflow_run.head_branch }}","run_url":"{{ root().data.workflow_run.html_url }}","source":"superplane"}'
      timeoutSeconds: 30
    position:
      x: 800
      y: 300
  - id: send-email-success-005
    name: Send Patch Started Email
    type: TYPE_COMPONENT
    component:
      name: sendEmail
    configuration:
      subject: '[AI SRE] Patch Started - {{ root().data.repository.name }}'
      body: |
        Deployment failure detected. Auto-patching initiated.
        
        Service: {{ root().data.repository.name }}
        Workflow: {{ root().data.workflow_run.name }}
        Run URL: {{ root().data.workflow_run.html_url }}
      recipients:
      - type: user
        user: 36cdfe5b-0997-444d-9128-adca7940ad3d
    position:
      x: 1100
      y: 200
  - id: send-email-failed-006
    name: Send Patch Failed Email
    type: TYPE_COMPONENT
    component:
      name: sendEmail
    configuration:
      subject: '[AI SRE] Patch Trigger Failed'
      body: |
        Deployment failure detected but patcher trigger failed.
        
        Service: {{ root().data.repository.name }}
        Run URL: {{ root().data.workflow_run.html_url }}
      recipients:
      - type: user
        user: 36cdfe5b-0997-444d-9128-adca7940ad3d
    position:
      x: 1100
      y: 400
  - id: noop-success-007
    name: Deployment Succeeded
    type: TYPE_COMPONENT
    component:
      name: noop
    configuration: {}
    position:
      x: 500
      y: 500
