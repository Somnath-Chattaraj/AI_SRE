version: '3.8'

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: sre-blackbox
    volumes:
      - ./sre_anomaly/prometheus/blackbox.yml:/config/blackbox.yml
    command:
      - '--config.file=/config/blackbox.yml'
    ports:
      - "9115:9115"

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sre-prometheus
    volumes:
      - ./sre_anomaly/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./sre_anomaly/prometheus/targets:/etc/prometheus/targets
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - blackbox-exporter

  # ── Patcher RAG ───────────────────────────────────────────────────────────────

  patcher-rag:
    build:
      context: .
      dockerfile: patcher-rag/Dockerfile
    container_name: sre-patcher
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PATCHER_PORT=4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── SRE Anomaly ───────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./sre_anomaly
    container_name: sre-backend
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_TARGETS_FILE=/etc/prometheus/targets/targets.json
      - PATCHER_URL=http://patcher-rag:4000
    ports:
      - "3000:3000"
    volumes:
      - ./sre_anomaly/prometheus/targets:/etc/prometheus/targets
    depends_on:
      redis:
        condition: service_started
      patcher-rag:
        condition: service_healthy

  producer:
    build:
      context: ./sre_anomaly
    container_name: sre-producer
    command: ["bun", "run", "src/queue/producer.ts"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - redis

  worker:
    build:
      context: ./sre_anomaly
    command: ["bun", "run", "src/worker/worker.ts"]
    container_name: sre-worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - PATCHER_URL=http://patcher-rag:4000
    depends_on:
      redis:
        condition: service_started
      patcher-rag:
        condition: service_healthy

volumes:
  redis_data:
  prometheus_data:
