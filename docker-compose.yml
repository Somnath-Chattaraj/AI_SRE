version: "3.8"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sre-prometheus
    volumes:
      - ./sre_anomaly/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./sre_anomaly/prometheus/targets:/etc/prometheus/targets
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - blackbox-exporter

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: sre-blackbox
    volumes:
      - ./sre_anomaly/prometheus/blackbox.yml:/config/blackbox.yml
    command:
      - "--config.file=/config/blackbox.yml"
    ports:
      - "9115:9115"

  # ── Backend Ecosystem ─────────────────────────────────────────────────────────

  patcher-rag:
    build:
      context: .
      dockerfile: patcher-rag/Dockerfile
    container_name: sre-patcher
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - CHROMA_API_KEY=${CHROMA_API_KEY}
      - CHROMA_TENANT=${CHROMA_TENANT}
      - CHROMA_DATABASE=${CHROMA_DATABASE}
      - HEALTH_CHECK_URL=${HEALTH_CHECK_URL:-http://host.docker.internal:6969/health}
      - PM2_SERVICE_NAME=${PM2_SERVICE_NAME:-buggy-app}
      - PATCHER_PORT=4000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-AI SRE Patcher}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-sre-patcher@ai-sre.local}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build: ./sre_anomaly
    container_name: sre-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_TARGETS_FILE=/etc/prometheus/targets/targets.json
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - PATCHER_URL=http://patcher-rag:4000
      - FRONTEND_URL=${NEXT_PUBLIC_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./sre_anomaly/prometheus/targets:/etc/prometheus/targets
    depends_on:
      redis:
        condition: service_started
      patcher-rag:
        condition: service_healthy

  producer:
    build: ./sre_anomaly
    container_name: sre-producer
    command: ["bun", "run", "src/queue/producer.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    depends_on:
      - redis

  worker:
    build: ./sre_anomaly
    container_name: sre-worker
    command: ["bun", "run", "src/worker/worker.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - PATCHER_URL=http://patcher-rag:4000
    depends_on:
      redis:
        condition: service_started
      patcher-rag:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: sre-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
