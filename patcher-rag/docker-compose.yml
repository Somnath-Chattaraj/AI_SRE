version: '3.8'

services:
  patcher-rag:
    build:
      context: ..
      dockerfile: patcher-rag/Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PATCHER_PORT=4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
